<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول – ShopZone</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="auth-page">
  <div style="width:100%;max-width:900px;display:flex;gap:0;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3)">

    <!-- LEFT SIDE BRANDING -->
    <div style="flex:1;background:linear-gradient(135deg,var(--secondary),#0f3460);padding:50px 40px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center" class="d-none d-md-flex">
      <div style="font-size:4rem;margin-bottom:20px">🛍️</div>
      <div class="logo" style="font-size:2.5rem;font-weight:900;color:white;margin-bottom:15px">Shop<span style="color:var(--primary)">Zone</span></div>
      <p style="color:rgba(255,255,255,0.7);line-height:1.8;font-size:0.95rem">سوق في أي مكان، في أي وقت.<br>آلاف المنتجات تنتظرك!</p>
      <div style="margin-top:30px;display:flex;flex-direction:column;gap:12px;width:100%">
        <div style="display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.7);font-size:0.85rem">
          <i class="fas fa-check-circle" style="color:var(--success)"></i> شحن سريع لجميع المحافظات
        </div>
        <div style="display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.7);font-size:0.85rem">
          <i class="fas fa-check-circle" style="color:var(--success)"></i> ضمان استرداد المبلغ خلال 30 يوم
        </div>
        <div style="display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.7);font-size:0.85rem">
          <i class="fas fa-check-circle" style="color:var(--success)"></i> +10,000 منتج متاح الآن
        </div>
      </div>
    </div>

    <!-- RIGHT SIDE FORM -->
    <div style="flex:1;background:var(--white);padding:40px">
      <div class="logo" style="font-size:1.8rem;font-weight:900;text-align:center;margin-bottom:30px">Shop<span style="color:var(--primary)">Zone</span></div>

      <!-- TABS -->
      <div style="display:flex;background:var(--bg);border-radius:var(--radius-sm);padding:4px;margin-bottom:25px">
        <button id="loginTab" onclick="showTab('login')" style="flex:1;padding:10px;border:none;border-radius:var(--radius-sm);font-family:var(--font-main);font-weight:700;font-size:0.9rem;cursor:pointer;background:var(--primary);color:white;transition:all 0.25s ease">تسجيل الدخول</button>
        <button id="registerTab" onclick="showTab('register')" style="flex:1;padding:10px;border:none;border-radius:var(--radius-sm);font-family:var(--font-main);font-weight:700;font-size:0.9rem;cursor:pointer;background:transparent;color:var(--text-muted);transition:all 0.25s ease">إنشاء حساب</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginForm">
        <h4 style="font-weight:800;text-align:center;margin-bottom:5px">مرحباً بعودتك! 👋</h4>
        <p class="sub" style="text-align:center;color:var(--text-muted);font-size:0.88rem;margin-bottom:20px">سجل دخولك للوصول لحسابك</p>

        <div class="mb-3">
          <label style="font-weight:600;font-size:0.88rem;margin-bottom:5px;display:block">البريد الإلكتروني</label>
          <div class="input-wrap">
            <input type="email" class="form-control auth-input" id="loginEmail" placeholder="example@mail.com">
            <i class="fas fa-envelope input-icon" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
          </div>
        </div>

        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label style="font-weight:600;font-size:0.88rem">كلمة المرور</label>
            <a href="#" style="color:var(--primary);font-size:0.8rem;font-weight:600">نسيت كلمة المرور؟</a>
          </div>
          <div class="input-wrap">
            <input type="password" class="form-control auth-input" id="loginPassword" placeholder="••••••••">
            <i class="fas fa-lock input-icon" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
          </div>
        </div>

        <div class="form-check mb-3">
          <input type="checkbox" class="form-check-input" id="rememberMe" style="accent-color:var(--primary)">
          <label class="form-check-label" for="rememberMe" style="font-size:0.88rem;cursor:pointer">تذكرني</label>
        </div>

        <button class="btn-auth" onclick="handleLogin()">
          <i class="fas fa-sign-in-alt me-2"></i>تسجيل الدخول
        </button>

        <div style="text-align:center;margin:20px 0;color:var(--text-muted);font-size:0.85rem;position:relative">
          <span style="background:var(--white);padding:0 10px;position:relative;z-index:1">أو</span>
          <hr style="position:absolute;top:50%;width:100%;margin:0;border-color:var(--border)">
        </div>

        <a href="../index.html">
          <button style="width:100%;background:transparent;border:1.5px solid var(--border);padding:12px;border-radius:var(--radius-sm);font-family:var(--font-main);font-size:0.9rem;cursor:pointer;color:var(--text);transition:all 0.25s ease" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">
            👤 متابعة كضيف
          </button>
        </a>
      </div>

      <!-- REGISTER FORM -->
      <div id="registerForm" style="display:none">
        <h4 style="font-weight:800;text-align:center;margin-bottom:5px">إنشاء حساب جديد ✨</h4>
        <p class="sub" style="text-align:center;color:var(--text-muted);font-size:0.88rem;margin-bottom:20px">انضم لمجتمع ShopZone الآن</p>

        <div class="mb-3">
          <label style="font-weight:600;font-size:0.88rem;margin-bottom:5px;display:block">الاسم الكامل</label>
          <div class="input-wrap">
            <input type="text" class="form-control auth-input" id="regName" placeholder="مثال: أحمد محمد">
            <i class="fas fa-user input-icon" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
          </div>
        </div>

        <div class="mb-3">
          <label style="font-weight:600;font-size:0.88rem;margin-bottom:5px;display:block">البريد الإلكتروني</label>
          <div class="input-wrap">
            <input type="email" class="form-control auth-input" id="regEmail" placeholder="example@mail.com">
            <i class="fas fa-envelope input-icon" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
          </div>
        </div>

        <div class="mb-3">
          <label style="font-weight:600;font-size:0.88rem;margin-bottom:5px;display:block">رقم الهاتف</label>
          <div class="input-wrap">
            <input type="tel" class="form-control auth-input" id="regPhone" placeholder="01xxxxxxxxx">
            <i class="fas fa-phone input-icon" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
          </div>
        </div>

        <div class="mb-3">
          <label style="font-weight:600;font-size:0.88rem;margin-bottom:5px;display:block">كلمة المرور</label>
          <div class="input-wrap">
            <input type="password" class="form-control auth-input" id="regPassword" placeholder="8 أحرف على الأقل">
            <i class="fas fa-lock input-icon" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
          </div>
        </div>

        <div class="form-check mb-3">
          <input type="checkbox" class="form-check-input" id="termsCheck" style="accent-color:var(--primary)">
          <label class="form-check-label" for="termsCheck" style="font-size:0.82rem;cursor:pointer">
            أوافق على <a href="#" style="color:var(--primary)">الشروط والأحكام</a> و<a href="#" style="color:var(--primary)">سياسة الخصوصية</a>
          </label>
        </div>

        <button class="btn-auth" onclick="handleRegister()">
          <i class="fas fa-user-plus me-2"></i>إنشاء الحساب
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container-custom"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
  function showTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
    document.getElementById('loginTab').style.background = isLogin ? 'var(--primary)' : 'transparent';
    document.getElementById('loginTab').style.color = isLogin ? 'white' : 'var(--text-muted)';
    document.getElementById('registerTab').style.background = isLogin ? 'transparent' : 'var(--primary)';
    document.getElementById('registerTab').style.color = isLogin ? 'var(--text-muted)' : 'white';
  }

  function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      showToast('⚠️ أدخل البريد الإلكتروني وكلمة المرور', 'error'); return;
    }

    const users = JSON.parse(localStorage.getItem('shopzone_users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);

    if (user) {
      localStorage.setItem('shopzone_user', JSON.stringify(user));
      showToast(`✅ مرحباً ${user.name}! جاري التحويل...`, 'success');
      setTimeout(() => location.href = '../index.html', 1500);
    } else {
      showToast('❌ البريد الإلكتروني أو كلمة المرور غير صحيحة', 'error');
    }
  }

  function handleRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const password = document.getElementById('regPassword').value;
    const terms = document.getElementById('termsCheck').checked;

    if (!name || !email || !phone || !password) {
      showToast('⚠️ من فضلك أكمل جميع الحقول', 'error'); return;
    }
    if (password.length < 8) {
      showToast('⚠️ كلمة المرور يجب أن تكون 8 أحرف على الأقل', 'error'); return;
    }
    if (!terms) {
      showToast('⚠️ يجب الموافقة على الشروط والأحكام', 'error'); return;
    }

    const users = JSON.parse(localStorage.getItem('shopzone_users') || '[]');
    if (users.find(u => u.email === email)) {
      showToast('⚠️ هذا البريد الإلكتروني مسجل مسبقاً', 'error'); return;
    }

    const newUser = { id: Date.now(), name, email, phone, password };
    users.push(newUser);
    localStorage.setItem('shopzone_users', JSON.stringify(users));
    localStorage.setItem('shopzone_user', JSON.stringify(newUser));

    showToast(`🎉 تم إنشاء حسابك بنجاح! مرحباً ${name}`, 'success');
    setTimeout(() => location.href = '../index.html', 1500);
  }

  // Style inputs
  document.querySelectorAll('.auth-input').forEach(input => {
    input.style.borderRadius = 'var(--radius-sm)';
    input.style.padding = '12px 40px 12px 15px';
    input.style.fontFamily = 'var(--font-main)';
    input.style.border = '1.5px solid var(--border)';
    input.addEventListener('focus', () => input.style.borderColor = 'var(--primary)');
    input.addEventListener('blur', () => input.style.borderColor = 'var(--border)');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') document.querySelector('.btn-auth').click(); });
  });
</script>
</body>
</html>
