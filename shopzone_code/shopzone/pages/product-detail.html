<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل المنتج – ShopZone</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar-shopzone">
  <div class="container h-100 d-flex align-items-center justify-content-between gap-2">
    <a href="../index.html" class="logo">Shop<span>Zone</span></a>
    <div class="search-box d-none d-md-flex w-100">
      <div class="input-group">
        <input type="text" class="form-control search-input" placeholder="ابحث عن أي منتج...">
        <button class="btn-search"><i class="fas fa-search"></i></button>
      </div>
    </div>
    <div class="d-flex align-items-center gap-2">
      <button class="dark-toggle" onclick="toggleDark()"><i class="fas fa-moon"></i> داكن</button>
      <div class="navbar-icons d-flex gap-2">
        <a href="wishlist.html"><i class="far fa-heart"></i></a>
        <a href="#" onclick="openCart()" style="position:relative">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-badge cart-count" style="display:none">0</span>
        </a>
      </div>
      <a href="login.html" id="authBtn"><button class="nav-btn"><i class="fas fa-sign-in-alt"></i> تسجيل دخول</button></a>
    </div>
  </div>
</nav>

<div style="background:var(--white);border-bottom:1px solid var(--border);padding:12px 0;">
  <div class="container">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0" style="font-size:0.85rem">
        <li class="breadcrumb-item"><a href="../index.html" style="color:var(--primary)">الرئيسية</a></li>
        <li class="breadcrumb-item"><a href="products.html" style="color:var(--primary)">المنتجات</a></li>
        <li class="breadcrumb-item active" id="breadcrumbProd">تفاصيل المنتج</li>
      </ol>
    </nav>
  </div>
</div>

<div class="container py-5" id="productDetail">
  <!-- Loading skeleton -->
  <div class="row g-4">
    <div class="col-md-5">
      <div class="skeleton" style="height:400px;border-radius:var(--radius)"></div>
      <div class="d-flex gap-2 mt-3">
        <div class="skeleton" style="height:70px;width:70px;border-radius:var(--radius-sm)"></div>
        <div class="skeleton" style="height:70px;width:70px;border-radius:var(--radius-sm)"></div>
        <div class="skeleton" style="height:70px;width:70px;border-radius:var(--radius-sm)"></div>
      </div>
    </div>
    <div class="col-md-7">
      <div class="skeleton" style="height:30px;margin-bottom:15px;width:80%"></div>
      <div class="skeleton" style="height:20px;margin-bottom:10px;width:40%"></div>
      <div class="skeleton" style="height:50px;margin-bottom:15px;width:50%"></div>
      <div class="skeleton" style="height:100px;margin-bottom:15px;border-radius:var(--radius-sm)"></div>
      <div class="skeleton" style="height:50px;border-radius:var(--radius-sm)"></div>
    </div>
  </div>
</div>

<!-- Related Products -->
<div class="container pb-5">
  <h3 class="section-title">منتجات <span>مشابهة</span></h3>
  <div class="row" id="relatedProducts"></div>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h5><i class="fas fa-shopping-cart me-2"></i>سلة التسوق</h5>
    <button class="cart-close" onclick="closeCart()">×</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span class="label">الإجمالي:</span>
      <span class="amount" id="cartTotal">0 جنيه</span>
    </div>
    <button class="btn-checkout" onclick="location.href='checkout.html';closeCart()">
      <i class="fas fa-credit-card me-2"></i>إتمام الشراء
    </button>
  </div>
</div>

<button id="scrollTop"><i class="fas fa-arrow-up"></i></button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
  let detailQty = 1;

  function loadProduct() {
    const urlParams = new URLSearchParams(window.location.search);
    const id = parseInt(urlParams.get('id'));
    const product = products.find(p => p.id === id) || products[0];

    document.title = product.name + ' – ShopZone';
    document.getElementById('breadcrumbProd').textContent = product.name;

    const savings = product.oldPrice ? product.oldPrice - product.price : 0;

    document.getElementById('productDetail').innerHTML = `
      <div class="row g-4">
        <div class="col-md-5">
          <img src="${product.img}" alt="${product.name}" class="detail-img-main" id="mainImg" onerror="this.src='https://via.placeholder.com/400x400?text=${product.name}'">
          <div class="thumb-list">
            <img src="${product.img}" alt="" class="active" onclick="switchImg(this, '${product.img}')">
            <img src="https://images.unsplash.com/photo-1484704849700-f032a568e944?w=150&h=150&fit=crop" alt="" onclick="switchImg(this, 'https://images.unsplash.com/photo-1484704849700-f032a568e944?w=400&h=400&fit=crop')">
            <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=150&h=150&fit=crop" alt="" onclick="switchImg(this, 'https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400&h=400&fit=crop')">
          </div>
        </div>

        <div class="col-md-7">
          <div class="d-flex gap-2 mb-2">
            <span style="background:var(--primary-light);color:var(--primary);padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:700">${product.category}</span>
            ${product.badge ? `<span style="background:var(--primary);color:white;padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:700">${product.badge}</span>` : ''}
          </div>

          <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:10px">${product.name}</h1>

          <div style="display:flex;align-items:center;gap:10px;margin-bottom:15px">
            <div class="stars" style="font-size:1rem">${renderStars(product.rating)}</div>
            <span style="font-size:0.9rem;color:var(--text-muted)">(${product.reviews} تقييم)</span>
            <span style="color:var(--success);font-size:0.85rem;font-weight:600"><i class="fas fa-check-circle"></i> متوفر</span>
          </div>

          <div style="display:flex;align-items:center;gap:15px;margin-bottom:20px">
            <span class="detail-price">${product.price.toLocaleString()} جنيه</span>
            ${product.oldPrice ? `<span class="detail-old-price">${product.oldPrice.toLocaleString()}</span>` : ''}
            ${product.discount ? `<span class="detail-discount">-${product.discount}%</span>` : ''}
          </div>

          ${savings > 0 ? `<div style="background:var(--primary-light);color:var(--primary);padding:10px 15px;border-radius:var(--radius-sm);font-weight:700;margin-bottom:15px;font-size:0.9rem">💰 توفير: ${savings.toLocaleString()} جنيه على هذا المنتج!</div>` : ''}

          <div style="background:var(--bg);border-radius:var(--radius-sm);padding:15px;margin-bottom:20px">
            <p style="font-size:0.9rem;line-height:1.8;color:var(--text-muted);margin:0">
              منتج عالي الجودة من أفضل الماركات العالمية. يتميز بتصميم أنيق وأداء استثنائي يناسب جميع الأذواق. 
              يأتي مع ضمان سنة كاملة وخدمة ما بعد البيع المميزة.
            </p>
          </div>

          <div style="margin-bottom:20px">
            <label style="font-weight:700;margin-bottom:8px;display:block">الكمية:</label>
            <div class="qty-big">
              <button onclick="changeDetailQty(-1)">−</button>
              <span id="detailQty">1</span>
              <button onclick="changeDetailQty(1)">+</button>
            </div>
          </div>

          <div class="d-flex gap-3 flex-wrap">
            <button class="btn-add-cart" data-id="${product.id}" style="flex:1;min-width:200px" onclick="addToCart(${product.id}, detailQty)">
              <i class="fas fa-shopping-cart"></i> أضف للسلة
            </button>
            <button onclick="toggleWishlist(${product.id}, this)" style="padding:12px 20px;border:2px solid var(--border);border-radius:var(--radius-sm);background:transparent;cursor:pointer;color:var(--text-muted);font-size:1.1rem;transition:all 0.25s ease" title="أضف للمفضلة">
              <i class="${wishlist.includes(product.id) ? 'fas' : 'far'} fa-heart" style="color:${wishlist.includes(product.id) ? 'var(--danger)' : ''}"></i>
            </button>
            <button onclick="shareProduct()" style="padding:12px 20px;border:2px solid var(--border);border-radius:var(--radius-sm);background:transparent;cursor:pointer;color:var(--text-muted);font-size:1.1rem">
              <i class="fas fa-share-alt"></i>
            </button>
          </div>

          <div style="margin-top:25px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-muted)">
              <i class="fas fa-shipping-fast" style="color:var(--primary)"></i> شحن خلال 24-48 ساعة
            </div>
            <div style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-muted)">
              <i class="fas fa-undo" style="color:var(--primary)"></i> إرجاع مجاني خلال 30 يوم
            </div>
            <div style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-muted)">
              <i class="fas fa-shield-alt" style="color:var(--primary)"></i> ضمان سنة كاملة
            </div>
            <div style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-muted)">
              <i class="fas fa-lock" style="color:var(--primary)"></i> دفع آمن 100%
            </div>
          </div>
        </div>
      </div>`;

    // Render related
    const related = products.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
    document.getElementById('relatedProducts').innerHTML = related.map(renderProductCard).join('');
  }

  function switchImg(thumb, src) {
    document.querySelectorAll('.thumb-list img').forEach(i => i.classList.remove('active'));
    thumb.classList.add('active');
    document.getElementById('mainImg').src = src;
  }

  function changeDetailQty(d) {
    detailQty = Math.max(1, detailQty + d);
    document.getElementById('detailQty').textContent = detailQty;
  }

  function shareProduct() {
    if (navigator.share) {
      navigator.share({ title: document.title, url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href);
      showToast('🔗 تم نسخ رابط المنتج!', 'success');
    }
  }

  setTimeout(loadProduct, 800);
</script>
</body>
</html>
